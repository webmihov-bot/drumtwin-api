<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DrumTwin Admin</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="admin-body">
  <header class="nav">
    <div class="container nav-inner">
      <a href="/" class="logo">DrumTwin<span class="dot">.</span> <small>Admin</small></a>
      <button class="btn btn-sm" id="logout-btn" style="display:none">Log out</button>
    </div>
  </header>

  <!-- login gate -->
  <div id="login-screen" class="section">
    <div class="container login-box">
      <h2>Admin login</h2>
      <p>Enter your admin token to continue.</p>
      <form id="login-form">
        <input type="password" id="token-input" placeholder="Admin token" autocomplete="current-password" required />
        <button type="submit" class="btn">Enter</button>
      </form>
      <p id="login-error" class="error" style="display:none">Invalid token. Try again.</p>
    </div>
  </div>

  <!-- admin panel -->
  <div id="admin-panel" style="display:none">
    <section class="section">
      <div class="container">
        <div class="admin-header">
          <h2>Projects</h2>
          <button class="btn" id="new-btn">+ New project</button>
        </div>
        <div id="project-list" class="admin-list"></div>
      </div>
    </section>
  </div>

  <!-- modal -->
  <div id="modal-overlay" class="modal-overlay" style="display:none">
    <div class="modal">
      <h3 id="modal-title">New project</h3>
      <form id="project-form">
        <label>Name <input type="text" id="f-name" required /></label>
        <label>Description <textarea id="f-desc" rows="3" required></textarea></label>
        <label>Status
          <select id="f-status">
            <option value="active">Active</option>
            <option value="coming_soon">Coming soon</option>
          </select>
        </label>
        <label>Tags (comma-separated) <input type="text" id="f-tags" placeholder="ai, automation" /></label>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" id="cancel-btn">Cancel</button>
          <button type="submit" class="btn" id="save-btn">Save</button>
        </div>
      </form>
    </div>
  </div>

  <footer class="footer">
    <div class="container">
      <a href="/">← Back to site</a>
    </div>
  </footer>

  <script>
    const TOKEN_KEY = 'drumtwin_admin_token';
    let token = sessionStorage.getItem(TOKEN_KEY);
    let editingId = null;

    function esc(str) {
      return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── auth ──────────────────────────────────────────────────────────────────

    function showPanel() {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-panel').style.display = '';
      document.getElementById('logout-btn').style.display = '';
      loadProjects();
    }

    function showLogin() {
      token = null;
      sessionStorage.removeItem(TOKEN_KEY);
      document.getElementById('login-screen').style.display = '';
      document.getElementById('admin-panel').style.display = 'none';
      document.getElementById('logout-btn').style.display = 'none';
    }

    if (token) showPanel();

    document.getElementById('login-form').addEventListener('submit', async e => {
      e.preventDefault();
      const candidate = document.getElementById('token-input').value.trim();
      const res = await fetch('/api/projects', { headers: { Authorization: `Bearer ${candidate}` } });
      // We test with a non-destructive call; admin endpoints would reveal auth status
      const testRes = await fetch('/api/admin/projects', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${candidate}` },
        body: JSON.stringify({ name: '__auth_test__', description: '__test__' }),
      });
      if (testRes.status === 401) {
        document.getElementById('login-error').style.display = '';
        return;
      }
      // Delete the test project we just created
      if (testRes.ok) {
        const proj = await testRes.json();
        await fetch(`/api/admin/projects/${proj.id}`, { method: 'DELETE', headers: { Authorization: `Bearer ${candidate}` } });
      }
      document.getElementById('login-error').style.display = 'none';
      token = candidate;
      sessionStorage.setItem(TOKEN_KEY, token);
      showPanel();
    });

    document.getElementById('logout-btn').addEventListener('click', showLogin);

    // ── projects ──────────────────────────────────────────────────────────────

    async function api(method, path, body) {
      const opts = { method, headers: { Authorization: `Bearer ${token}` } };
      if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
      const res = await fetch(path, opts);
      if (res.status === 401) { showLogin(); throw new Error('Unauthorized'); }
      if (res.status === 204) return null;
      return res.json();
    }

    async function loadProjects() {
      const list = document.getElementById('project-list');
      list.innerHTML = '<p>Loading…</p>';
      try {
        const projects = await api('GET', '/api/projects');
        if (!projects.length) { list.innerHTML = '<p>No projects yet.</p>'; return; }
        list.innerHTML = projects.map(p => `
          <div class="admin-row">
            <div class="admin-row-info">
              <strong>${esc(p.name)}</strong>
              <span class="badge-status ${p.status === 'active' ? 'active' : 'soon'}">${p.status === 'active' ? 'Active' : 'Coming soon'}</span>
              <p class="admin-desc">${esc(p.description)}</p>
              ${p.tags.length ? `<div class="tags">${p.tags.map(t => `<span class="tag">${esc(t)}</span>`).join('')}</div>` : ''}
            </div>
            <div class="admin-row-actions">
              <button class="btn btn-sm btn-ghost" onclick="openEdit('${esc(p.id)}')">Edit</button>
              <button class="btn btn-sm btn-danger" onclick="deleteProject('${esc(p.id)}', ${JSON.stringify(esc(p.name))})">Delete</button>
            </div>
          </div>
        `).join('');
      } catch (err) {
        if (token) list.innerHTML = '<p class="error">Failed to load projects.</p>';
      }
    }

    // ── modal ─────────────────────────────────────────────────────────────────

    function openModal(id) {
      editingId = id || null;
      document.getElementById('modal-title').textContent = id ? 'Edit project' : 'New project';
      document.getElementById('modal-overlay').style.display = 'flex';
    }

    function closeModal() {
      editingId = null;
      document.getElementById('project-form').reset();
      document.getElementById('modal-overlay').style.display = 'none';
    }

    document.getElementById('new-btn').addEventListener('click', () => openModal(null));
    document.getElementById('cancel-btn').addEventListener('click', closeModal);
    document.getElementById('modal-overlay').addEventListener('click', e => {
      if (e.target === document.getElementById('modal-overlay')) closeModal();
    });

    window.openEdit = async function(id) {
      const projects = await api('GET', '/api/projects');
      const p = projects.find(x => x.id === id);
      if (!p) return;
      document.getElementById('f-name').value = p.name;
      document.getElementById('f-desc').value = p.description;
      document.getElementById('f-status').value = p.status;
      document.getElementById('f-tags').value = p.tags.join(', ');
      openModal(id);
    };

    window.deleteProject = async function(id, name) {
      if (!confirm(`Delete "${name}"?`)) return;
      await api('DELETE', `/api/admin/projects/${id}`);
      loadProjects();
    };

    document.getElementById('project-form').addEventListener('submit', async e => {
      e.preventDefault();
      const body = {
        name: document.getElementById('f-name').value.trim(),
        description: document.getElementById('f-desc').value.trim(),
        status: document.getElementById('f-status').value,
        tags: document.getElementById('f-tags').value.split(',').map(t => t.trim()).filter(Boolean),
      };
      if (editingId) {
        await api('PUT', `/api/admin/projects/${editingId}`, body);
      } else {
        await api('POST', '/api/admin/projects', body);
      }
      closeModal();
      loadProjects();
    });
  </script>
</body>
</html>
